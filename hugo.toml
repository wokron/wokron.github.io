baseURL = "https://wokron.github.io/"
title = "Wokron's Blog"

theme = "PaperMod"

paginate = 6

copyright = "©2022-2026 Yitang Yang. All rights reserved."

defaultContentLanguage = "zh"
defaultContentLanguageInSubdir = false

enableRobotsTXT = true

buildDrafts = true

[taxonomies]
tag = "tags"
category = "categories"
series = "series"

[params]
env = "production"
ShowShareButtons = true
ShowReadingTime = true
ShowPostNavLinks = true
ShowBreadCrumbs = true
ShowCodeCopyButtons = true
ShowWordCount = true
ShowRssButtonInSectionTermList = true
showtoc = true

math = true
comments = true

[params.assets]
favicon = "/img/favicon/96x96.png"
favicon16x16 = "/img/favicon/16x16.png"
favicon32x32 = "/img/favicon/32x32.png"

[[params.socialIcons]]
name = "github"
title = "My Github Account"
url = "https://github.com/wokron"

[[params.socialIcons]]
name = "email"
title = "Send Me Email"
url = "mailto:yi1tang.yang@gmail.com"

[[params.socialIcons]]
name = "qq"
title = "My QQ Account"
url = "mailto:3160114036@qq.com"

# ==================== 中文配置 ====================
[languages.zh]
languageName = "中文"
title = "Wokron's Blog"
weight = 1

[languages.zh.params]
description = "Wokron 的个人博客。记录学习、分享经验"
author = "Wokron"
keywords = ["blog", "code", "tutorial"]

[languages.zh.params.editPost]
URL = "https://github.com/wokron/wokron.github.io/blob/master/content"
Text = "阅读原文"
appendFilePath = true

[languages.zh.params.homeInfoParams]
enabled = true
title = "Welcome to My Blog"
content = "欢迎光临！文章不定期更新，希望能对您有帮助 :)"

[[languages.zh.menu.main]]
identifier = "series"
